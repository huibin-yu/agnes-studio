# Agnes Studio - Docker Compose
# One-command deployment: docker compose up -d
#
# Usage:
#   1. Copy .env.example to .env and fill in AGNES_API_KEY
#      cp .env.example .env
#   2. Start everything:
#      docker compose up -d
#   3. Access:
#      Frontend: http://localhost:3000
#      Backend API: http://localhost:8000
#      API Docs: http://localhost:8000/docs

version: '3.8'

services:
  # ============================================================
  # Backend - FastAPI + SQLite
  # ============================================================
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_VERSION: "3.11"
    container_name: agnes-studio-backend
    ports:
      - "8000:8000"
    environment:
      - AGNES_API_KEY=${AGNES_API_KEY:-your_api_key_here}
      - AGNES_API_BASE=https://apihub.agnes-ai.com/v1
      - DATABASE_URL=sqlite+aiosqlite:///./agnes_studio.db
      - SECRET_KEY=${SECRET_KEY:-change-me-in-production}
      - BASE_URL=http://localhost:3000
      - IMAGE_DEFAULT_SIZE=1024x768
      - VIDEO_DEFAULT_FRAMES=121
      - VIDEO_DEFAULT_FPS=24
      - IMAGE_COST=1
      - VIDEO_COST_PER_SECOND=2
      - FREE_CREDITS_ON_REGISTER=10
      - REFERRAL_BONUS=5
    volumes:
      # Persist SQLite database
      - db_data:/app/data
      # Persist uploaded files and generated content
      - upload_data:/app/uploads
      - generated_data:/app/generated
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/api/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    networks:
      - agnes-network

  # ============================================================
  # Frontend - Next.js (standalone build)
  # ============================================================
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: agnes-studio-frontend
    ports:
      - "3000:3000"
    environment:
      - NEXT_PUBLIC_API_URL=http://backend:8000/api
      - NEXT_PUBLIC_WS_URL=ws://backend:8000
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    networks:
      - agnes-network

# ============================================================
# Volumes
# ============================================================
volumes:
  db_data:
    driver: local
  upload_data:
    driver: local
  generated_data:
    driver: local

# ============================================================
# Networks
# ============================================================
networks:
  agnes-network:
    driver: bridge
